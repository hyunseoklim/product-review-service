version: "3.9"

services:
  # =========================================================
  # [기존] PostgreSQL
  # =========================================================
  db:
    image: ankane/pgvector:v0.5.1
    container_name: product_review_postgres
    restart: always
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: product_user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - product_review_postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # =========================================================
  # [추가] Django (DRF 서버)
  # =========================================================
  web:
    build: ./backend
    container_name: drf-web
    command: python manage.py runserver 0.0.0.0:8000
    restart: always
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - FASTAPI_BASE_URL=http://fastapi:8001
    depends_on:
      - db
      - redis
    networks:
      - app-network

  # =========================================================
  # [추가] FastAPI (AI 서버)
  # =========================================================
  fastapi:
    build:
      context: ./ai-server
    container_name: fastapi-server
    command: uvicorn main:app --host 0.0.0.0 --port 8001
    restart: always
    volumes:
      - ./ai-server:/app
    ports:
      - "8001:8001"
    networks:
      - app-network

  # =========================================================
  # [추가] Celery Worker
  # =========================================================
  celery:
    build: ./backend
    container_name: celery-worker
    command: celery -A mysite worker --loglevel=info --pool=solo
    restart: always
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - FASTAPI_BASE_URL=http://fastapi:8001
    depends_on:
      - db
      - redis
      - web
      - fastapi
    networks:
      - app-network

  # =========================================================
  # [추가] Redis (Celery Broker + Result Backend)
  # =========================================================
  redis:
    image: redis:7
    container_name: redis-new
    restart: always
    ports:
      - "6379:6379"
    networks:
      - app-network

volumes:
  product_review_postgres_data:

networks:
  app-network:
    driver: bridge
