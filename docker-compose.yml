version: "3.9"

services:
  db:
    image: ankane/pgvector:v0.5.1
    container_name: product_review_postgres
    restart: always
    env_file:
      - ./backend/.env.dev
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - product_review_postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7
    container_name: redis-new
    restart: always
    ports:
      - "6379:6379"
    networks:
      - app-network

  web:
    build: ./backend
    container_name: drf-web
    command: python manage.py runserver 0.0.0.0:8000
    restart: always
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.dev
    depends_on:
      - db
      - redis
      - fastapi
    networks:
      - app-network

  celery:
    build: ./backend
    container_name: celery-worker
    command: celery -A mysite worker --loglevel=info --pool=solo
    restart: always
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env.dev
    depends_on:
      - db
      - redis
      - web
      - fastapi
    networks:
      - app-network

  fastapi:
    build:
      context: ./ai-server
    container_name: fastapi-server
    command: uvicorn main:app --host 0.0.0.0 --port 8001
    restart: always
    volumes:
      - ./ai-server:/app
    ports:
      - "8001:8001"
    networks:
      - app-network

volumes:
  product_review_postgres_data:

networks:
  app-network:
    driver: bridge
